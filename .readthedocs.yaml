# Read the Docs konfiguratsiyasi
# https://docs.readthedocs.io/en/stable/config-file/v2.html
version: 2

build:
  os: ubuntu-24.04
  tools:
    python: "3.13"
  # weasyprint (PDF generatsiyasi) uchun kerakli tizim kutubxonalari
  apt_packages:
    - libpango-1.0-0
    - libpangoft2-1.0-0
    - libharfbuzz0b
  jobs:
    # HTML qurilgandan so'ng PDF (sphinx-simplepdf) ni ham quramiz va
    # yuklab olinadigan qilib $READTHEDOCS_OUTPUT/pdf/ ga ko'chiramiz
    post_build:
      - mkdir -p "${READTHEDOCS_OUTPUT}/pdf"
      - python -m sphinx -b simplepdf source /tmp/simplepdf
      - cp "/tmp/simplepdf/SarhadNGFW.pdf" "${READTHEDOCS_OUTPUT}/pdf/"

# Sphinx konfiguratsiya faylining joylashuvi
sphinx:
  configuration: source/conf.py

# Build paytida o'rnatiladigan paketlar
python:
  install:
    - requirements: requirements.txt
